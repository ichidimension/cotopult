<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COTOPULT [ proto type ] - Speaking Recorder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-indigo: #6366f1;
            --neon-red: #f43f5e;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .font-digital { font-family: 'Orbitron', sans-serif; }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .neon-glow-indigo {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }
        .neon-glow-red {
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.5);
        }
        .recording-pulse {
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(244, 63, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full glass-card rounded-[2.5rem] p-8 md:p-12 relative overflow-hidden">
        <div class="absolute -top-24 -right-24 w-64 h-64 bg-indigo-600/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-rose-600/10 rounded-full blur-3xl"></div>

        <header class="text-center mb-10 relative z-10">
            <h1 class="text-3xl md:text-4xl font-digital font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 mb-2">
                COTOPULT <span class="text-sm align-middle opacity-100 text-cyan-300 ml-1 font-sans">[ proto type ]</span>
            </h1>
            <p class="text-slate-400 text-sm uppercase tracking-[0.4em]">Speaking Recorder</p>
        </header>

        <div class="space-y-8 relative z-10">
            <div class="flex justify-center gap-3 flex-wrap">
                <button onclick="setTimer(30)" id="btn-30" class="time-btn px-4 py-2 rounded-full border border-slate-700 text-slate-400 text-xs font-semibold hover:border-indigo-500 hover:text-indigo-400 transition-all">30S</button>
                <button onclick="setTimer(60)" id="btn-60" class="time-btn px-4 py-2 rounded-full border border-indigo-500 bg-indigo-500/10 text-indigo-400 text-xs font-semibold transition-all">1M</button>
                <button onclick="setTimer(120)" id="btn-120" class="time-btn px-4 py-2 rounded-full border border-slate-700 text-slate-400 text-xs font-semibold hover:border-indigo-500 hover:text-indigo-400 transition-all">2M</button>
                <button onclick="setTimer(180)" id="btn-180" class="time-btn px-4 py-2 rounded-full border border-slate-700 text-slate-400 text-xs font-semibold hover:border-indigo-500 hover:text-indigo-400 transition-all">3M</button>
            </div>

            <div class="text-center py-6">
                <div id="timerDisplay" class="font-digital text-8xl font-bold text-white tabular-nums drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">01:00</div>
                <div id="statusLabel" class="text-[10px] font-bold text-slate-500 mt-4 uppercase tracking-[0.5em]">System Ready</div>
            </div>

            <div class="flex justify-center">
                <button id="actionBtn" class="group w-24 h-24 rounded-full bg-indigo-600 neon-glow-indigo flex items-center justify-center transition-all active:scale-90 relative">
                    <span id="micIcon" class="text-3xl">🎤</span>
                </button>
            </div>

            <div class="space-y-3">
                <div class="flex flex-col gap-3">
                    <div class="flex justify-between items-center px-1">
                        <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Live Transcription</span>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <button onclick="copyOnlyText()" class="flex items-center justify-center gap-2 text-[10px] font-bold text-slate-400 hover:text-white bg-white/5 hover:bg-white/10 px-4 py-3 rounded-xl border border-white/10 transition-all active:scale-95">
                            <span id="copyOnlyLabel">COPY ONLY TEXT</span>
                        </button>
                        
                        <button onclick="copyToClipboardWithPrompt()" class="flex items-center justify-center gap-2 text-[10px] font-bold text-indigo-300 hover:text-white bg-indigo-500/10 hover:bg-indigo-500/20 px-4 py-3 rounded-xl border border-indigo-500/30 transition-all shadow-lg active:scale-95">
                            <span id="copyAiLabel">COPY FOR AI</span>
                        </button>
                    </div>
                </div>
                <textarea id="output" readonly class="w-full h-40 p-6 bg-black/30 border border-white/5 rounded-3xl text-indigo-100 leading-relaxed placeholder:text-slate-700 outline-none resize-none scrollbar-hide text-lg" placeholder="Standing by for voice input..."></textarea>
            </div>
        </div>
    </div>

    <script>
        let recognition;
        let countdown;
        let timeLeft = 60;
        let isRecording = false;
        let fullTranscript = "";
        let selectedDuration = 60;

        const timerDisplay = document.getElementById('timerDisplay');
        const statusLabel = document.getElementById('statusLabel');
        const actionBtn = document.getElementById('actionBtn');
        const micIcon = document.getElementById('micIcon');
        const output = document.getElementById('output');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            initRecognition();
        }

        function initRecognition() {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.onresult = (event) => {
                let interim = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const text = event.results[i][0].transcript;
                    if (event.results[i].isFinal) fullTranscript += text + " ";
                    else interim += text;
                }
                output.value = fullTranscript + interim;
                output.scrollTop = output.scrollHeight;
            };
            recognition.onend = () => { if (isRecording && timeLeft > 0) recognition.start(); };
        }

        function setTimer(sec) {
            if (isRecording) return;
            selectedDuration = sec;
            timeLeft = sec;
            updateDisplay();
            document.querySelectorAll('.time-btn').forEach(btn => btn.className = "time-btn px-4 py-2 rounded-full border border-slate-700 text-slate-400 text-xs font-semibold hover:border-indigo-500 hover:text-indigo-400 transition-all");
            document.getElementById(`btn-${sec}`).className = "time-btn px-4 py-2 rounded-full border border-indigo-500 bg-indigo-500/10 text-indigo-400 text-xs font-semibold transition-all";
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${m}:${s}`;
        }

        actionBtn.onclick = () => { if (isRecording) stop(); else start(); };

        function start() {
            isRecording = true;
            timeLeft = selectedDuration;
            fullTranscript = "";
            output.value = "";
            actionBtn.classList.replace('bg-indigo-600', 'bg-rose-500');
            actionBtn.classList.add('recording-pulse');
            micIcon.innerText = "⏹";
            statusLabel.innerText = "Transcribing Live";
            try { recognition.start(); } catch(e) {}
            countdown = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) stop();
            }, 1000);
        }

        function stop() {
            isRecording = false;
            clearInterval(countdown);
            try { recognition.stop(); } catch(e) {}
            actionBtn.classList.replace('bg-rose-500', 'bg-indigo-600');
            actionBtn.classList.remove('recording-pulse');
            micIcon.innerText = "🎤";
            statusLabel.innerText = "Task Completed";
        }

        function writeToClipboard(text, successFn) {
            // iFrame内での権限エラーを避けるため、直接 document.execCommand を使用する手法を優先します
            try {
                const el = document.createElement('textarea');
                el.value = text;
                // 画面外に配置
                el.style.position = 'fixed';
                el.style.left = '-9999px';
                el.style.top = '0';
                document.body.appendChild(el);
                el.select();
                el.setSelectionRange(0, 99999); // モバイル対応

                const successful = document.execCommand('copy');
                document.body.removeChild(el);
                
                if (successful && successFn) {
                    successFn();
                }
            } catch (err) {
                console.error('Fallback copy failed', err);
            }
        }

        function copyOnlyText() {
            // 現在のテキストエリアから直接取得
            const currentSpeech = document.getElementById('output').value.trim();
            if (!currentSpeech) return;
            
            // プロンプトを含めず、発話内容のみをコピー
            writeToClipboard(currentSpeech, () => {
                const label = document.getElementById('copyOnlyLabel');
                label.innerText = "COPIED TEXT!";
                setTimeout(() => label.innerText = "COPY ONLY TEXT", 2000);
            });
        }

        function copyToClipboardWithPrompt() {
            // 現在のテキストエリアから直接取得
            const currentSpeech = document.getElementById('output').value.trim();
            if (!currentSpeech) return;

            const promptTemplate = `以上が学習者の話した英文（以後、これを『学習者のオリジナル発話内容』とします）です。この文章について次の①から⑥のことを実行してください。ただし、①から⑥の結果のみを示し、それ以外の文章は全く表示しないでください。

① 発話内容
学習者が話した英文を次の[1][2]のように直して表示してください。ただし、[1][2]以外は直してはいけません。[1]適切な部分にコンマ、ピリオドを付けてください。[2]必要な部分は小文字を大文字にしてください。また、この①の文章の語数を[ 〇〇 words ]のように表示してください。

② 発話内容（和訳）
「学習者のオリジナル発話内容」を日本語にしてください。なお、文法的・表現的に不自然な箇所があったとしても、訂正せずにそのまま和訳してください。ここで書かれた日本語を見て、学習者が自分の英文の不自然な部分があるのであれば、それに気づくことを促すためです。

③ 修正提案
「学習者のオリジナル発話内容」を適切な語彙・文法に沿った自然な英語表現に直したものを表示してください。

④ 関連語彙
学習者が伝えたい内容について、頻出する関連する語彙・熟語表現を７つ、その日本語の意味と並べて表示してください。

⑤ 関連する話題への橋渡しに向けた一文
学習者が伝えたい発話内容を、さらに発展的に述べるための最初の一文を、３つ表示し、その日本語の意味と並べて表示してください。

⑥ 評価
学習者の発話内容の評価を表示してください。[1] CEFR基準でどの程度のレベルにあるか示してください。[2] 学習者が前向きに次の学習に取り組めるような前向きな総括コメントを表示してください。`;

            // 発話内容を先頭に結合
            const combinedContent = currentSpeech + "\n\n" + promptTemplate;

            writeToClipboard(combinedContent, () => {
                const label = document.getElementById('copyAiLabel');
                label.innerText = "COPIED WITH PROMPT!";
                setTimeout(() => label.innerText = "COPY FOR AI", 2000);
            });
        }
    </script>
</body>
</html>
