
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COTOPULT - Voice Launchpad for AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-indigo: #6366f1;
            --neon-red: #f43f5e;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* スクロールを禁止し画面内に収める */
        }
        .font-digital { font-family: 'Orbitron', sans-serif; }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .neon-glow-indigo {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }
        .recording-pulse {
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(244, 63, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* 画面全体にフィットさせるコンテナ */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
    </style>
</head>
<body class="bg-[#0f172a]">

    <div class="app-container">
        <!-- メインカード領域（フッターボタン配置用に最大高さを微調整） -->
        <div class="max-w-6xl w-full h-full max-h-[660px] glass-card rounded-[2.5rem] p-6 md:p-8 relative overflow-hidden flex flex-col mb-5">
            
            <div class="absolute -top-24 -right-24 w-64 h-64 bg-indigo-600/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-rose-600/10 rounded-full blur-3xl"></div>

            <!-- 2カラムレイアウト（左：3割 / 右：7割） -->
            <div class="grid grid-cols-1 sm:grid-cols-10 gap-6 relative z-10 h-full">
                
                <!-- 左カラム（タイトル・タイマー設定・ステータス・マイク） -->
                <div class="sm:col-span-3 flex flex-col justify-between border-b sm:border-b-0 sm:border-r border-white/10 pb-6 sm:pb-0 sm:pr-6 h-full">
                    
                    <!-- ① 1行に収めたタイトルエリア -->
                    <header class="text-center">
                        <h1 class="inline-block text-2xl sm:text-[1.3rem] md:text-2xl lg:text-4xl font-digital font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 mb-1 whitespace-nowrap pr-4">
                            COTOPULT
                        </h1>
                        <!-- サブタイトル（静的ドット） -->
                        <div class="flex items-center justify-center gap-1.5 mt-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500/80"></span>
                            <p class="text-slate-400 text-[9px] uppercase tracking-[0.25em] font-medium">Voice Launchpad for AI</p>
                        </div>
                    </header>

                    <!-- タイマーボタン＆センタリング表示＆マイクボタンの一体型ブロック -->
                    <div class="space-y-6 my-auto flex flex-col items-center w-full">
                        
                        <!-- ② 3M(3分)ボタンを追加した時間選択エリア -->
                        <div class="flex gap-1.5 w-full justify-center">
                            <button onclick="setTimer(30)" id="btn-30" class="time-btn flex-1 py-1.5 rounded-full border border-slate-700 text-slate-400 text-[10px] font-semibold hover:border-indigo-500 transition-all">30S</button>
                            <button onclick="setTimer(60)" id="btn-60" class="time-btn flex-1 py-1.5 rounded-full border border-indigo-500 bg-indigo-500/10 text-indigo-400 text-[10px] font-semibold transition-all">1M</button>
                            <button onclick="setTimer(120)" id="btn-120" class="time-btn flex-1 py-1.5 rounded-full border border-slate-700 text-slate-400 text-[10px] font-semibold hover:border-indigo-500 transition-all">2M</button>
                            <button onclick="setTimer(180)" id="btn-180" class="time-btn flex-1 py-1.5 rounded-full border border-slate-700 text-slate-400 text-[10px] font-semibold hover:border-indigo-500 transition-all">3M</button>
                        </div>

                        <!-- ③ センタリング配置されたタイマー表示 -->
                        <div class="text-center w-full">
                            <div id="timerDisplay" class="font-digital text-5xl lg:text-6xl font-bold text-white tabular-nums">01:00</div>
                            <div id="statusLabel" class="text-[9px] font-bold text-slate-500 mt-1 uppercase tracking-[0.4em] text-center">System Ready</div>
                        </div>

                        <!-- ④ タイマー表示の下にマイクボタンを配置 -->
                        <div class="flex justify-center w-full pt-1">
                            <button id="actionBtn" class="group w-16 h-16 rounded-full bg-indigo-600 neon-glow-indigo flex items-center justify-center transition-all active:scale-90">
                                <span id="micIcon" class="text-xl">🎤</span>
                            </button>
                        </div>
                    </div>

                    <!-- 下部余白調整用 -->
                    <div class="hidden sm:block h-6"></div>
                </div>

                <!-- 右カラム（発話テキスト → コピーボタンの順に配置） -->
                <div class="sm:col-span-7 flex flex-col h-full space-y-3">
                    
                    <!-- 上部：見出し -->
                    <div class="flex items-center justify-between">
                        <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Live Transcription</span>
                    </div>

                    <!-- 中部：発話テキストエリア（高さを最大化） -->
                    <div class="flex-grow min-h-0">
                        <textarea id="output" 
                                  class="w-full h-full p-5 bg-black/40 border border-white/5 rounded-2xl text-indigo-100 leading-relaxed placeholder:text-slate-800 outline-none resize-none scrollbar-hide text-base md:text-lg" 
                                  placeholder="Standing by for voice input..."></textarea>
                    </div>

                    <!-- 下部：コピーボタン（一番下に配置） -->
                    <div class="flex gap-2 w-full">
                        <button onclick="copyOnlyText()" class="flex-1 text-[10px] font-bold text-slate-400 hover:text-white bg-white/5 py-3 rounded-xl border border-white/10 transition-all active:scale-95">
                            <span id="copyOnlyLabel">COPY TEXT</span>
                        </button>
                        <button onclick="copyToClipboardWithPrompt()" class="flex-1 text-[10px] font-bold text-indigo-300 hover:text-white bg-indigo-500/10 py-3 rounded-xl border border-indigo-500/30 transition-all active:scale-95">
                            <span id="copyAiLabel">COPY FOR AI</span>
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- ⑤ ページ最下部：チャットAIへのリンク（ボタン仕様へ進化＆センタリング） -->
        <footer class="relative z-10 flex flex-wrap items-center justify-center gap-3 w-full max-w-2xl px-4">
            
            <!-- Copilot ボタン -->
            <a href="https://copilot.microsoft.com/" target="_blank" rel="noopener noreferrer" 
               class="flex items-center gap-2 px-4 py-2 bg-slate-900/60 border border-white/5 rounded-xl text-xs font-semibold text-slate-400 hover:text-cyan-400 hover:bg-cyan-500/10 hover:border-cyan-500/30 transition-all duration-300">
                <span class="text-sm">🤖</span> Copilot
            </a>
            
            <!-- Gemini ボタン -->
            <a href="https://gemini.google.com/" target="_blank" rel="noopener noreferrer" 
               class="flex items-center gap-2 px-4 py-2 bg-slate-900/60 border border-white/5 rounded-xl text-xs font-semibold text-slate-400 hover:text-indigo-400 hover:bg-indigo-500/10 hover:border-indigo-500/30 transition-all duration-300">
                <span class="text-sm">✨</span> Gemini
            </a>
            
            <!-- ChatGPT ボタン -->
            <a href="https://chatgpt.com/" target="_blank" rel="noopener noreferrer" 
               class="flex items-center gap-2 px-4 py-2 bg-slate-900/60 border border-white/5 rounded-xl text-xs font-semibold text-slate-400 hover:text-emerald-400 hover:bg-emerald-500/10 hover:border-emerald-500/30 transition-all duration-300">
                <span class="text-sm">💬</span> ChatGPT
            </a>
            
        </footer>
    </div>

    <script>
        let recognition;
        let countdown;
        let timeLeft = 60;
        let isRecording = false;
        let fullTranscript = "";
        let selectedDuration = 60;

        const timerDisplay = document.getElementById('timerDisplay');
        const statusLabel = document.getElementById('statusLabel');
        const actionBtn = document.getElementById('actionBtn');
        const micIcon = document.getElementById('micIcon');
        const output = document.getElementById('output');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            initRecognition();
        }

        // キーボード入力による編集を音声認識用変数と同期させ、コピーや追記が崩れないようにする
        output.addEventListener('input', () => {
            fullTranscript = output.value;
        });

        function initRecognition() {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.onresult = (event) => {
                let interim = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const text = event.results[i][0].transcript;
                    if (event.results[i].isFinal) fullTranscript += text + " ";
                    else interim += text;
                }
                output.value = fullTranscript + interim;
                output.scrollTop = output.scrollHeight;
            };
            recognition.onend = () => { if (isRecording && timeLeft > 0) recognition.start(); };
        }

        function setTimer(sec) {
            if (isRecording) return;
            selectedDuration = sec;
            timeLeft = sec;
            updateDisplay();
            document.querySelectorAll('.time-btn').forEach(btn => btn.className = "time-btn flex-1 py-1.5 rounded-full border border-slate-700 text-slate-400 text-[10px] font-semibold hover:border-indigo-500 transition-all");
            document.getElementById(`btn-${sec}`).className = "time-btn flex-1 py-1.5 rounded-full border border-indigo-500 bg-indigo-500/10 text-indigo-400 text-[10px] font-semibold transition-all";
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${m}:${s}`;
        }

        actionBtn.onclick = () => { if (isRecording) stop(); else start(); };

        function start() {
            isRecording = true;
            timeLeft = selectedDuration;
            fullTranscript = "";
            output.value = "";
            actionBtn.classList.replace('bg-indigo-600', 'bg-rose-500');
            actionBtn.classList.add('recording-pulse');
            micIcon.innerText = "⏹";
            statusLabel.innerText = "Transcribing...";
            try { recognition.start(); } catch(e) {}
            countdown = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) stop();
            }, 1000);
        }

        function stop() {
            isRecording = false;
            clearInterval(countdown);
            try { recognition.stop(); } catch(e) {}
            actionBtn.classList.replace('bg-rose-500', 'bg-indigo-600');
            actionBtn.classList.remove('recording-pulse');
            micIcon.innerText = "🎤";
            statusLabel.innerText = "Completed";
        }

        function writeToClipboard(text, successFn) {
            const el = document.createElement('textarea');
            el.value = text;
            el.style.position = 'fixed';
            el.style.opacity = '0';
            document.body.appendChild(el);
            el.select();
            el.setSelectionRange(0, 99999);
            
            try {
                const successful = document.execCommand('copy');
                if (successful) successFn();
            } catch (err) {
                console.error('Copy failed', err);
            }
            
            document.body.removeChild(el);
        }

        function copyOnlyText() {
            const currentSpeech = document.getElementById('output').value.trim();
            if (!currentSpeech) return;
            
            writeToClipboard(currentSpeech, () => {
                const label = document.getElementById('copyOnlyLabel');
                label.innerText = "COPIED!";
                setTimeout(() => label.innerText = "COPY TEXT", 2000);
            });
        }

        function copyToClipboardWithPrompt() {
            const currentSpeech = document.getElementById('output').value.trim();
            if (!currentSpeech) return;

            const promptTemplate = `以上が学習者の話した英文（以後、これを『学習者のオリジナル発話内容』とします）です。この文章について次の①から⑥のことを実行してください。ただし、①から⑥の結果のみを示し、それ以外の文章は全く表示しないでください。

① 発話内容
学習者が話した英文を次の[1][2]のように直して表示してください。ただし、[1][2]以外は直してはいけません。[1]適切な部分にコンマ、ピリオドを付けてください。[2]必要な部分は小文字を大文字にしてください。また、この①の文章の語数を[ 〇〇 words ]のように表示してください。

② 発話内容（和訳）
「学習者のオリジナル発話内容」を日本語にしてください。なお、文法的・表現的に不自然な箇所があったとしても、訂正せずにそのまま和訳してください。ここで書かれた日本語を見て、学習者が自分の英文の不自然な部分があるのであれば、それに気づくことを促すためです。

③ 修正提案
「学習者のオリジナル発話内容」を適切な語彙・文法に沿った自然な英語表現に直したものを表示してください。

④ 関連語彙
学習者が伝えたい内容について、頻出する関連する語彙・熟語表現を７つ、その日本語の意味と並べて表示してください。

⑤ 関連する話題への橋渡しに向けた一文
学習者が伝えたい発話内容を、さらに発展的に述べるための最初の一文を、３つ表示し、その日本語の意味と並べて表示してください。

⑥ 評価
学習者の発話内容の評価を表示してください。[1] CEFR基準でどの程度のレベルにあるか示してください。[2] 学習者が前向きに次の学習に取り組めるような前向きな総括コメントを表示してください。`;

            const combinedText = currentSpeech + "\n\n" + promptTemplate;

            writeToClipboard(combinedText, () => {
                const label = document.getElementById('copyAiLabel');
                label.innerText = "COPIED!";
                setTimeout(() => label.innerText = "COPY FOR AI", 2000);
            });
        }
    </script>
</body>
</html>
